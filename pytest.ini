[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output & reporting ────────────────────────────────────────────────────────
addopts =
    --html=reports/report.html
    --self-contained-html
    --json-report
    --json-report-file=reports/report.json
    -v
    --tb=short
    --strict-markers
    --reruns=2
    --reruns-delay=2

# ── xfail discipline ─────────────────────────────────────────────────────────
# Unexpected passes (XPASS) fail the suite by default, forcing docs/app_bugs.md
# to stay current. Individual markers that legitimately allow XPASS use strict=False.
xfail_strict = true

# ── Timeouts ──────────────────────────────────────────────────────────────────
timeout = 120
# `signal` (default) cannot interrupt blocking Playwright calls (WebSocket recv,
# page.wait_for_url, etc.) because they're in C land. `thread` uses a watchdog
# thread that calls Thread._stop on the test thread — works for sync Playwright.
timeout_method = thread

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    e2e: End-to-end browser UI tests
    accessibility: WCAG accessibility tests using axe-core
    visual: Visual regression screenshot comparison tests
    api: HTTP-layer API tests (no browser)
    performance: Page load and performance metric tests
    smoke: Fast subset of critical tests for quick CI checks
    regression: Full regression suite
    regression_write: Write-side regression — only runs against SANDBOX_ORG_SLUG; opt-in via workflow_dispatch
    auth: Tests that require a logged-in session (need TEST_EMAIL_1 / TEST_PASSWORD_1)
    skip_on_ci: Tests to skip in CI environments
    mobile: Tests that exercise the mobile viewport (390×844)

# ── Log output ────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
